services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: crossagentmemory-postgres
    environment:
      POSTGRES_USER: crossagentmemory
      POSTGRES_PASSWORD: crossagentmemory
      POSTGRES_DB: crossagentmemory
    ports:
      - "5432:5432"
    volumes:
      - CROSSAGENTMEMORY_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crossagentmemory"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  CROSSAGENTMEMORY_pgdata:
